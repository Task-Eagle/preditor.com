<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Resale Editor</title>

  <script
    src="https://cdn.tiny.cloud/1/2p2l25oelqzedzfutzatno8es69g7870iofwb1o4cbmlikz7/tinymce/8/tinymce.min.js"
    referrerpolicy="origin">
  </script>
</head>
<body>

  <textarea id="editor">
    <h2>Product Listing</h2>
    <p>Add your product description here.</p>
  </textarea>

  <script>
    tinymce.init({
      selector: '#editor',

      plugins: [
        'accordion', 'advlist', 'anchor', 'autolink', 'autoresize', 'autosave',
        'charmap', 'code', 'codesample', 'directionality', 'emoticons', 'fullscreen',
        'help', 'image', 'importcss', 'insertdatetime', 'link', 'lists', 'media',
        'nonbreaking', 'pagebreak', 'preview', 'quickbars', 'save', 'searchreplace',
        'table', 'visualblocks', 'visualchars', 'wordcount'
      ],

      toolbar:
        'undo redo | blocks | ' +
        'bold italic underline | ' +
        'alignleft aligncenter alignright alignjustify | ' +
        'bullist numlist | ' +
        'link image media table | ' +
        'searchreplace | preview fullscreen | code',

      menubar: 'file edit view insert format tools table help',

      height: 600,

      autosave_ask_before_unload: true,

      content_style: `
        body {
          font-family: Arial, Helvetica, sans-serif;
          font-size: 14px;
        }
      `
    });
  </script>

</body>
</html>
